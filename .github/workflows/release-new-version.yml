name: Create a New Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version component to bump'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - rc

run-name: "Release ${{ inputs.bump }} bump on ${{ github.ref_name }}"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    uses: valkyrjaio/.github/.github/workflows/_create-ts-release.yml@e1649df4c48632468d20eed6cdb5a82f0edcd013
    secrets: inherit
    with:
      bump: ${{ inputs.bump }}
      dependencies: |
        [
          {"name": "Root and Suggested CI", "directory": ".github/ci/root-and-suggested"},
          {"name": "TypeScript",            "directory": ".github/ci/typescript"},
          {"name": "ESLint",               "directory": ".github/ci/eslint"},
          {"name": "Prettier",             "directory": ".github/ci/prettier"},
          {"name": "Vitest",               "directory": ".github/ci/vitest"}
        ]
      info-file-path: src/Sindri/Constant/SindriInfo.ts
      info-file-name: SindriInfo

  publish:
    needs: release
    uses: valkyrjaio/.github/.github/workflows/_ts-release-npm-publish.yml@e1649df4c48632468d20eed6cdb5a82f0edcd013
    secrets: inherit
